name: Build VoiceInk Package

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build whisper.xcframework
        run: |
          set -euo pipefail
          mkdir -p "$HOME/VoiceInk-Dependencies"
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git "$HOME/VoiceInk-Dependencies/whisper.cpp"
          cd "$HOME/VoiceInk-Dependencies/whisper.cpp"
          ./build-xcframework.sh

      - name: Build VoiceInk (local unsigned)
        run: |
          set -euo pipefail
          xcodebuild -project VoiceInk.xcodeproj -scheme VoiceInk -configuration Debug \
            -xcconfig LocalBuild.xcconfig \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="$GITHUB_WORKSPACE/VoiceInk/VoiceInk.local.entitlements" \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) LOCAL_BUILD' \
            build

      - name: Package app
        run: |
          set -euo pipefail
          APP_PATH="$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "VoiceInk.app" -path "*/Debug/*" -type d | head -1)"
          if [ -z "$APP_PATH" ]; then
            echo "VoiceInk.app was not found in DerivedData."
            exit 1
          fi

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/VoiceInk-macOS.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInk-macOS
          path: dist/VoiceInk-macOS.zip

      - name: Attach package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VoiceInk-macOS.zip
          generate_release_notes: true
